appId: com.bonsai.app
productName: Bonsai
directories:
  output: dist
  buildResources: build

# App files. electron-builder auto-includes production node_modules (so the
# external better-sqlite3 / uuid required by the main bundle ship too); we just
# add the built output.
files:
  - out/**
  - package.json

# better-sqlite3 is a native addon — its .node can't run from inside the asar,
# so unpack the whole package.
asarUnpack:
  - "**/node_modules/better-sqlite3/**"

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
  # Sign with the "Developer ID Application" cert auto-discovered from the login
  # keychain (CSC_IDENTITY_AUTO_DISCOVERY, default on). Hardened runtime +
  # entitlements are required for notarization.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Notarization runs automatically when the App Store Connect API key env vars
  # are present (APPLE_API_KEY / APPLE_API_KEY_ID / APPLE_API_ISSUER); it is
  # skipped with a warning when they are absent, so unsigned local builds still
  # work.

dmg:
  title: ${productName} ${version}
