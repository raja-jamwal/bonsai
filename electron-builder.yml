appId: com.bonsai.app
productName: Bonsai
directories:
  output: dist
  buildResources: build

# App files. electron-builder auto-includes production node_modules (so the
# external better-sqlite3 / uuid required by the main bundle ship too); we just
# add the built output.
files:
  - out/**
  - package.json

# better-sqlite3 is a native addon — its .node can't run from inside the asar,
# so unpack the whole package.
asarUnpack:
  - "**/node_modules/better-sqlite3/**"

# No Apple Developer ID — we ad-hoc sign in afterPack instead (electron-builder's
# own signing stays disabled via identity:null). Ad-hoc signing is required on
# Apple Silicon so the (repacked) bundle isn't rejected as "damaged".
afterPack: scripts/afterPack.cjs

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
  identity: null

dmg:
  title: ${productName} ${version}
