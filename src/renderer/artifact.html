<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Artifact host — loaded ONLY inside a sandboxed <iframe sandbox="allow-scripts">
      (Artifact.tsx). Because the iframe has no allow-same-origin, this document
      runs at a unique opaque origin: it CANNOT reach window.parent, window.api,
      the app DOM, cookies, or storage. It talks to the app solely via postMessage.

      This CSP is the artifact's own (a separately-loaded document does not inherit
      the strict app CSP). It is permissive about CODE EXECUTION on purpose — the
      runtime sucrase-transpiles JSX and evaluates user code (needs unsafe-eval),
      and HTML artifacts may carry inline scripts/handlers (unsafe-inline). What
      keeps that safe is the ISOLATION above plus connect-src 'none' (no network →
      nothing the artifact does can exfiltrate data or call home).
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; font-src data:; media-src data: blob:; connect-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background: #fff;
        color: #1a1a1a;
      }
      #root {
        padding: 12px;
      }
      .artifact-error {
        margin: 0;
        padding: 12px 14px;
        font:
          12.5px/1.5 ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
        color: #b00020;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./artifact-runtime.tsx"></script>
  </body>
</html>
